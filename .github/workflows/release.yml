name: Release

# TUS-2419 — Configure release workflow
#
# Triggered by pushing a version tag, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags: [ "v*.*.*" ]

defaults:
  run:
    working-directory: academic-system

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build jar (skip tests — already validated by CI before tagging)
        run: mvn -B clean package -DskipTests

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: academic-system/target/academic-system.jar
          generate_release_notes: true
